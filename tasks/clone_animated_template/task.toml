schema_version = "1.2"
artifacts = ["/app/pages", "/app/rendered"]

[task]
name = "proximal/clone_animated-TEMPLATE"
description = "Reproduce a multi-page animated website from 6 keyframes + a short WebM per page. Score mixes per-frame WebSight with a temporal frame-delta SSIM."
authors = []
keywords = ["clone", "html", "animated", "websight"]

[metadata]

[agent]
timeout_sec = 1800.0

[verifier]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 1800.0
os = "linux"
cpus = 4
memory_mb = 4096
storage_mb = 8192
gpus = 0
allow_internet = true
workdir = "/app"
mcp_servers = []
[environment.env]
