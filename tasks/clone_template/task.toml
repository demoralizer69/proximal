schema_version = "1.2"
artifacts = ["/app/pages", "/app/rendered"]

[task]
name = "proximal/clone-TEMPLATE"
description = "Reproduce a multi-page website from screenshots. Reward is pixel MAE similarity (1 - MAE/255) per page, aggregated across pages with generalized power mean PM_p (p=0.05)."
authors = []
keywords = ["clone", "html", "websight"]

[metadata]

[agent]
timeout_sec = 7200.0

[verifier]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 1800.0
os = "linux"
cpus = 4
memory_mb = 4096
storage_mb = 8192
gpus = 0
allow_internet = true
workdir = "/app"
mcp_servers = []
[environment.env]
