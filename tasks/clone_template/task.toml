schema_version = "1.2"
artifacts = ["/app/pages"]

[task]
name = "proximal/clone-TEMPLATE"
description = "Reproduce a multi-page website from screenshots. Mean SSIM across pages is the reward."
authors = []
keywords = ["clone", "html", "ssim"]

[metadata]

[agent]
timeout_sec = 1800.0

[verifier]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 1800.0
os = "linux"
cpus = 4
memory_mb = 4096
storage_mb = 8192
gpus = 0
allow_internet = false
workdir = "/app"
mcp_servers = []
[environment.env]
